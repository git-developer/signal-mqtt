name: docker build

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - 'LICENSE'
      - 'README.*'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

# permissions are needed if pushing to ghcr.io
permissions:
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        platform: [linux/amd64, linux/arm64]
#        os: [ubuntu-latest, ubuntu-24.04-arm]
        buildfile: [ubuntu, alpine]
#        source: [project, community, distro]

#      exclude:
#        - platform: linux/arm64
#          os: ubuntu-latest
#        - platform: linux/amd64
#          os: ubuntu-24.04-arm
#        - buildfile: alpine
#          source: community
#        - buildfile: ubuntu
#          source: distro
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-24.04-arm
          - buildfile: ubuntu
            source: project
          - buildfile: ubuntu
            source: community
          - buildfile: alpine
            source: project
          - buildfile: alpine
            source: distro

    steps:
      -
        name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >>"${GITHUB_ENV}"
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
#      -
#        name: Set up QEMU
#        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: image
          file: image/Dockerfile.${{ matrix.buildfile }}
          build-args: |
            BASE_IMAGE: ${{ matrix.base_image }}
            SOURCE: ${{ matrix.source }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ matrix.buildfile }}-${{ matrix.source }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      -
        name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      -
        name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}-${{ matrix.buildfile }}-${{ matrix.source }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: true
      matrix:
        buildfile: [ubuntu, alpine]
        source: [project, community, distro]
        exclude:
          - buildfile: ubuntu
            source: distro
          - buildfile: alpine
            source: community
    steps:
      -
        name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern:  digests-${{ matrix.buildfile }}-${{ matrix.source }}*
          merge-multiple: true
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${DOCKER_METADATA_OUTPUT_JSON}") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
      -
        name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
